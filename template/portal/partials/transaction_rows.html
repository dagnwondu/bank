<table style="width: 100%; text-align: left; border-collapse: collapse;">
    <thead>
        <tr style="color: #6b7280; text-transform: uppercase; font-size: 0.75rem;">
            <th style="padding: 0.75rem 0.5rem;">Date</th>
            <th style="padding: 0.75rem 0.5rem;">Account</th>
            <th style="padding: 0.75rem 0.5rem;">Transaction Type</th>
            <th style="padding: 0.75rem 0.5rem;">Contra Account</th>
            <th style="padding: 0.75rem 0.5rem;">Description</th>
            <th style="padding: 0.75rem 0.5rem; text-align: right;">Amount</th>
        </tr>
    </thead>
    <tbody>
        {% for tx in transactions %}
        <tr style="border-top: 1px solid #f3f4f6;">
            <td style="padding: 0.75rem 0.5rem; font-size: 0.875rem; color: #111827;">{{ tx.created_at|date:"M d, Y" }}</td>
            <td style="padding: 0.75rem 0.5rem; font-size: 0.875rem; color: #111827;">{{ tx.account }}</td>
            <td style="padding: 0.75rem 0.5rem; font-size: 0.875rem; color: #111827;">{{ tx.transaction_type }}</td>
            <td style="padding: 0.75rem 0.5rem; font-size: 0.875rem; color: #111827;">{{ tx.contra_account }}</td>
            <td style="padding: 0.75rem 0.5rem; font-size: 0.875rem; color: #111827;">{{ tx.description }}</td>
            <td style="padding: 0.75rem 0.5rem; font-size: 0.875rem; text-align: right; color: 
            {% if tx.amount < 0 %}#dc2626
            {% else %}#16a34a
            {% endif %}; font-weight: 600;">
                {{ tx.amount }}
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" style="padding: 1rem; text-align: center; color: #6b7280;">No transactions found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
