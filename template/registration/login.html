{% extends "auth_base.html" %}

{% block auth_content %}
<div class="flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
        
        <div class="mb-8">
            <h2 class="text-xl font-bold text-slate-900">Sign In</h2>
            <p class="text-slate-500 text-sm mt-1">Please enter your credentials to continue</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% if form.non_field_errors %}
                <div class="bg-red-50 text-red-600 text-sm p-4 rounded-lg border border-red-100">
                    {{ form.non_field_errors.0 }}
                </div>
            {% endif %}

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none transition">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition shadow-md">
                Secure Login
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <a href="{% url 'password_reset' %}" class="text-blue-600 hover:underline">Forgot password?</a>
        </div>
    </div>
</div>
{% endblock %}
