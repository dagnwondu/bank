<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waysington Bank | Secure Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    
    <header class="w-full pt-12 pb-6 text-center">
        <h1 class="text-3xl font-extrabold text-blue-900 tracking-tight">Dashen Bank</h1>
        <p class="text-slate-600 mt-1 font-medium text-lg">Secure Web Banking</p>
    </header>

    <main class="flex-grow">
        {% block auth_content %}{% endblock %}
    </main>

    <footer class="text-center py-8 text-xs text-slate-400">
        <p>&copy; 2026 Dashen Bank. All rights reserved.</p>
        <p class="mt-1">Authorized access only. Monitored environment.</p>
    </footer>

</body>
</html>
